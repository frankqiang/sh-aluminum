<!doctype html>
<html>
  <head>
    <style>
      html {
        background: #F8F9FA;
      }
      body {
        width: 720pt;
        height: 405pt;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        display: flex;
        background: #f8f9fa;
        position: relative;
        box-sizing: border-box;
      }
      .header {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 50pt;
        background: #1e3a5f;
        display: flex;
        align-items: center;
        padding: 0 35pt;
      }
      .header-badge {
        background: #2ecc71;
        padding: 4pt 10pt;
        border-radius: 3pt;
      }
      .badge-text {
        font-size: 10pt;
        font-weight: bold;
        margin: 0;
        color: #ffffff;
      }
      .header h1 {
        color: #ffffff;
        font-size: 18pt;
        font-weight: bold;
        margin: 0 0 0 12pt;
      }
      .main {
        margin-top: 55pt;
        padding: 10pt 35pt;
        box-sizing: border-box;
      }
      .feature-table {
        background: #F8F9FA;
        border-radius: 5pt;
        padding: 12pt;
        box-shadow: 0 2pt 5pt rgba(0, 0, 0, 0.06);
        margin-bottom: 10pt;
      }
      .feature-row {
        display: flex;
        padding: 7pt 0;
        border-bottom: 1pt solid #eeeeee;
      }
      .feature-row:last-child {
        border-bottom: none;
      }
      .feature-name {
        width: 110pt;
        color: #1e3a5f;
        font-size: 10pt;
        font-weight: bold;
        margin: 0;
      }
      .feature-desc {
        flex: 1;
        color: #555555;
        font-size: 10pt;
        margin: 0;
      }
      .feature-value {
        width: 140pt;
        color: #2ecc71;
        font-size: 10pt;
        font-weight: bold;
        margin: 0;
      }
      .dashboard-preview {
        background: #1e3a5f;
        border-radius: 5pt;
        padding: 10pt 12pt;
      }
      .dashboard-title {
        color: #ffffff;
        font-size: 10pt;
        text-align: center;
        margin: 0 0 8pt 0;
      }
      .dashboard-grid {
        display: flex;
        gap: 8pt;
      }
      .dashboard-col {
        flex: 1;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4pt;
        padding: 8pt;
        text-align: center;
      }
      .col-title {
        color: #e76f51;
        font-size: 9pt;
        font-weight: bold;
        margin: 0 0 5pt 0;
      }
      .col-text {
        color: #ffffff;
        font-size: 8pt;
        margin: 0;
      }
      .highlight-col {
        flex: 1;
        background: rgba(46, 204, 113, 0.2);
        border-radius: 4pt;
        padding: 8pt;
        text-align: center;
      }
      .highlight-title {
        color: #2ecc71;
        font-size: 9pt;
        font-weight: bold;
        margin: 0 0 5pt 0;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-badge"><p class="badge-text">解决方案</p></div>
      <h1>排产模块：解决计划管理分散</h1>
    </div>
    <div class="main">
      <div class="feature-table">
        <div class="feature-row">
          <p class="feature-name">统一排产平台</p>
          <p class="feature-desc">轧机/分切/精切三层计划在同一系统中管理</p>
          <p class="feature-value">取代32个Sheet</p>
        </div>
        <div class="feature-row">
          <p class="feature-name">生产看板</p>
          <p class="feature-desc">实时显示各机台的计划进度、在制数量</p>
          <p class="feature-value">一眼看清整体状况</p>
        </div>
        <div class="feature-row">
          <p class="feature-name">计划联动</p>
          <p class="feature-desc">轧机完成自动更新可分切料清单</p>
          <p class="feature-value">信息实时同步</p>
        </div>
        <div class="feature-row">
          <p class="feature-name">修改留痕</p>
          <p class="feature-desc">所有计划调整保留修改记录</p>
          <p class="feature-value">可追溯谁改了什么</p>
        </div>
      </div>
      <div class="dashboard-preview">
        <p class="dashboard-title">生产计划看板示意</p>
        <div class="dashboard-grid">
          <div class="dashboard-col">
            <p class="col-title">轧机</p>
            <p class="col-text">今日计划12卷 | 已完成8卷</p>
          </div>
          <div class="dashboard-col">
            <p class="col-title">分切</p>
            <p class="col-text">今日计划45卷 | 已完成32卷</p>
          </div>
          <div class="dashboard-col">
            <p class="col-title">精切</p>
            <p class="col-text">今日计划120卷 | 已完成95卷</p>
          </div>
          <div class="highlight-col">
            <p class="highlight-title">整体</p>
            <p class="col-text">订单完成率: 87%</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
