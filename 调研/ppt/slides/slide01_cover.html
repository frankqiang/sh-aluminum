<!doctype html>
<html>
  <head>
    <style>
      html {
        background: #1e3a5f;
      }
      body {
        width: 720pt;
        height: 405pt;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        display: flex;
        background: #1e3a5f;
        position: relative;
        overflow: hidden;
        box-sizing: border-box;
      }
      .accent-bar {
        position: absolute;
        left: 0;
        bottom: 0;
        width: 720pt;
        height: 8pt;
        background: #e76f51;
      }
      .content {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        padding: 50pt 60pt;
        box-sizing: border-box;
        width: 720pt;
        height: 405pt;
      }
      h1 {
        color: #ffffff;
        font-size: 38pt;
        font-weight: bold;
        margin: 0 0 12pt 0;
      }
      .subtitle {
        color: #e76f51;
        font-size: 20pt;
        font-weight: normal;
        margin: 0 0 25pt 0;
      }
      .divider {
        width: 70pt;
        height: 3pt;
        background: #e76f51;
      }
      .info {
        color: rgba(255, 255, 255, 0.7);
        font-size: 13pt;
        margin: 20pt 0 0 0;
        line-height: 1.6;
      }
      .date-tag {
        position: absolute;
        bottom: 25pt;
        right: 35pt;
      }
      .date-tag p {
        color: rgba(255, 255, 255, 0.6);
        font-size: 11pt;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="accent-bar"></div>
    <div class="content">
      <h1>MES系统项目方案</h1>
      <p class="subtitle">痛点分析与解决方案</p>
      <div class="divider"></div>
      <p class="info">
        基于现场调研，梳理当前生产管理痛点<br />提出MES系统整体解决方案
      </p>
    </div>
    <div class="date-tag">
      <p>2026年2月</p>
    </div>
  </body>
</html>
