<!doctype html>
<html>
  <head>
    <style>
      html {
        background: #F8F9FA;
      }
      body {
        width: 720pt;
        height: 405pt;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        display: flex;
        background: #f8f9fa;
        position: relative;
        box-sizing: border-box;
      }
      .header {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 50pt;
        background: #1e3a5f;
        display: flex;
        align-items: center;
        padding: 0 35pt;
      }
      .header-badge {
        background: #e76f51;
        padding: 4pt 10pt;
        border-radius: 3pt;
      }
      .badge-text {
        font-size: 11pt;
        font-weight: bold;
        margin: 0;
        color: #ffffff;
      }
      .header h1 {
        color: #ffffff;
        font-size: 20pt;
        font-weight: bold;
        margin: 0 0 0 12pt;
      }
      .main {
        margin-top: 58pt;
        padding: 12pt 35pt;
        display: flex;
        gap: 20pt;
        box-sizing: border-box;
      }
      .status-card {
        flex: 1;
        background: #F8F9FA;
        border-radius: 6pt;
        padding: 15pt;
        box-shadow: 0 2pt 5pt rgba(0, 0, 0, 0.06);
      }
      .card-title {
        color: #1e3a5f;
        font-size: 13pt;
        font-weight: bold;
        margin: 0 0 8pt 0;
      }
      .title-bar {
        width: 40pt;
        height: 2pt;
        background: #e76f51;
        margin-bottom: 10pt;
      }
      .status-card ul {
        margin: 0;
        padding-left: 16pt;
      }
      .status-card li {
        color: #444444;
        font-size: 10pt;
        margin-bottom: 8pt;
        line-height: 1.4;
      }
      .data-card {
        flex: 1;
        background: #F8F9FA;
        border-radius: 6pt;
        padding: 15pt;
        box-shadow: 0 2pt 5pt rgba(0, 0, 0, 0.06);
      }
      .data-highlight {
        text-align: center;
        padding: 12pt 0;
      }
      .big-number {
        color: #e76f51;
        font-size: 42pt;
        font-weight: bold;
        margin: 0;
      }
      .data-label {
        color: #666666;
        font-size: 11pt;
        margin: 6pt 0 0 0;
      }
      .data-note {
        background: #fff8f6;
        border-radius: 4pt;
        padding: 10pt;
        margin-top: 12pt;
      }
      .data-note p {
        color: #555555;
        font-size: 10pt;
        margin: 0;
        line-height: 1.4;
      }
      .impact-bar {
        position: absolute;
        bottom: 15pt;
        left: 35pt;
        right: 35pt;
        background: #fff3e0;
        border: 1pt solid #ffcc80;
        border-radius: 5pt;
        padding: 10pt 15pt;
        display: flex;
        align-items: center;
      }
      .impact-icon {
        background: #e76f51;
        padding: 3pt 8pt;
        border-radius: 3pt;
      }
      .impact-icon p {
        color: #ffffff;
        font-size: 9pt;
        font-weight: bold;
        margin: 0;
      }
      .impact-text {
        color: #444444;
        font-size: 9pt;
        margin: 0 0 0 12pt;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-badge"><p class="badge-text">痛点 3</p></div>
      <h1>在制品追踪困难</h1>
    </div>
    <div class="main">
      <div class="status-card">
        <p class="card-title">现状描述</p>
        <div class="title-bar"></div>
        <ul>
          <li>
            <b>找料困难</b
            >：分切完成后大量子卷堆在现场，精切人员需在大量料卷中寻找
          </li>
          <li><b>位置信息模糊</b>：料卷位置靠手写或口头传递</li>
          <li><b>状态不可见</b>：无法实时知道现在有多少料等待精切</li>
          <li><b>呆滞料隐藏</b>：长期未处理的料卷可能被遗忘</li>
        </ul>
      </div>
      <div class="data-card">
        <p class="card-title">现场数据</p>
        <div class="title-bar"></div>
        <div class="data-highlight">
          <p class="big-number">~1000</p>
          <p class="data-label">个分切子卷堆在现场</p>
        </div>
        <div class="data-note">
          <p>
            精切人员拿到计划后，需要凭经验在现场寻找对应料卷。有时料明明在那里，但找了半天才找到。
          </p>
        </div>
      </div>
    </div>
    <div class="impact-bar">
      <div class="impact-icon"><p>影响</p></div>
      <p class="impact-text">
        找料时间长影响效率 · 在制品积压不透明 · 呆滞料占用场地资源
      </p>
    </div>
  </body>
</html>
