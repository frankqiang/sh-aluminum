<!doctype html>
<html>
  <head>
    <style>
      html {
        background: #F8F9FA;
      }
      body {
        width: 720pt;
        height: 405pt;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        display: flex;
        background: #f8f9fa;
        position: relative;
        box-sizing: border-box;
      }
      .header {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 50pt;
        background: #1e3a5f;
        display: flex;
        align-items: center;
        padding: 0 35pt;
      }
      .header h1 {
        color: #ffffff;
        font-size: 20pt;
        font-weight: bold;
        margin: 0;
      }
      .pain-grid {
        margin-top: 58pt;
        padding: 10pt 30pt;
        display: flex;
        flex-wrap: wrap;
        gap: 12pt;
        box-sizing: border-box;
        height: 340pt;
        align-content: flex-start;
      }
      .pain-card {
        width: 320pt;
        background: #F8F9FA;
        border-radius: 5pt;
        padding: 12pt;
        box-shadow: 0 2pt 5pt rgba(0, 0, 0, 0.08);
        border-top: 3pt solid #e76f51;
        box-sizing: border-box;
      }
      .pain-header {
        display: flex;
        align-items: center;
        margin-bottom: 8pt;
      }
      .pain-number {
        width: 22pt;
        height: 22pt;
        background: #e76f51;
        color: #ffffff;
        font-size: 11pt;
        font-weight: bold;
        text-align: center;
        line-height: 22pt;
        border-radius: 50%;
      }
      .pain-title {
        color: #1e3a5f;
        font-size: 12pt;
        font-weight: bold;
        margin: 0 0 0 8pt;
      }
      .pain-desc {
        color: #555555;
        font-size: 9pt;
        margin: 0 0 6pt 0;
        line-height: 1.4;
      }
      .impact-wrap {
        background: #fff3e0;
        border-radius: 3pt;
        padding: 4pt 6pt;
        display: inline-block;
      }
      .impact-text {
        color: #e76f51;
        font-size: 8pt;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>现状痛点 - 四大核心问题</h1>
    </div>
    <div class="pain-grid">
      <div class="pain-card">
        <div class="pain-header">
          <div class="pain-number">
            <p style="color: #fff; font-size: 11pt; margin: 0">1</p>
          </div>
          <p class="pain-title">计划管理分散</p>
        </div>
        <p class="pain-desc">
          32个Excel Sheet分散管理轧机/分切/精切计划，无汇总视图
        </p>
        <div class="impact-wrap">
          <p class="impact-text">影响：信息不同步、难以把握整体进度</p>
        </div>
      </div>
      <div class="pain-card">
        <div class="pain-header">
          <div class="pain-number">
            <p style="color: #fff; font-size: 11pt; margin: 0">2</p>
          </div>
          <p class="pain-title">质量评审不规范且传递断链</p>
        </div>
        <p class="pain-desc">评审信息采用自由文本描述不统一，需手动复制传递</p>
        <div class="impact-wrap">
          <p class="impact-text">影响：难以统计分析、信息传递断链</p>
        </div>
      </div>
      <div class="pain-card">
        <div class="pain-header">
          <div class="pain-number">
            <p style="color: #fff; font-size: 11pt; margin: 0">3</p>
          </div>
          <p class="pain-title">在制品追踪困难</p>
        </div>
        <p class="pain-desc">
          约1000个分切子卷堆在现场，靠人工找料，位置靠记忆
        </p>
        <div class="impact-wrap">
          <p class="impact-text">影响：找料困难、呆滞料不可见</p>
        </div>
      </div>
      <div class="pain-card">
        <div class="pain-header">
          <div class="pain-number">
            <p style="color: #fff; font-size: 11pt; margin: 0">4</p>
          </div>
          <p class="pain-title">订单进度不透明</p>
        </div>
        <p class="pain-desc">订单无状态跟踪，多卷订单靠人工统计，无逾期预警</p>
        <div class="impact-wrap">
          <p class="impact-text">影响：交期管理困难、客户投诉风险</p>
        </div>
      </div>
    </div>
  </body>
</html>
